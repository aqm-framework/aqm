# =============================================================================
# Blog SEO Optimization Pipeline
# =============================================================================
# Flow: analyzer -> rewriter -> keyword_checker (LLM gate) -> publisher
#
# Differentiators used:
#   - approve/reject gate (LLM gate on SEO score)
#   - Reverse feedback loop (low SEO score -> back to rewriter)
#   - Fan-out parallel branches (readability + technical SEO checks)
#   - File-based context.md accumulation
#   - ${{ params.X }} parameterization
#
# Usage:
#   aqm run --input "Optimize: /blog/posts/getting-started-with-kubernetes.md"
# =============================================================================

apiVersion: aqm/v0.1

params:
  target_keyword: "kubernetes tutorial"
  secondary_keywords: "k8s beginner guide, container orchestration, kubectl"
  target_word_count: "2000"
  reading_level: "intermediate"
  target_seo_score: "85"

agents:
  # ── Stage 1: SEO Analysis ──────────────────────────────────────────────
  # Analyzes the current blog post for SEO weaknesses.
  - id: analyzer
    name: SEO Analyzer
    runtime: api
    model: claude-sonnet-4-20250514
    mcp:
      - server: filesystem
    system_prompt: |
      You are an SEO specialist. Analyze the blog post for SEO optimization.

      Target keyword: "${{ params.target_keyword }}"
      Secondary keywords: ${{ params.secondary_keywords }}
      Target word count: ${{ params.target_word_count }}

      Audit the following:
      1. Title tag optimization (includes keyword? under 60 chars?)
      2. Meta description (compelling? under 160 chars? includes keyword?)
      3. Heading structure (H1, H2, H3 hierarchy)
      4. Keyword density (target: 1-2% for primary)
      5. Internal and external link analysis
      6. Image alt text
      7. Content gaps vs. top-ranking competitors
      8. Readability score

      Provide a current SEO score (0-100) and specific improvement areas.

      Blog post: {{ input }}
    handoffs:
      - to: rewriter
        task: optimize_content
        condition: always

  # ── Stage 2: Content Rewriting ─────────────────────────────────────────
  # Rewrites the content based on SEO analysis.
  - id: rewriter
    name: SEO Rewriter
    runtime: api
    model: claude-sonnet-4-20250514
    system_prompt: |
      Rewrite the blog post to improve SEO while maintaining quality.

      Primary keyword: "${{ params.target_keyword }}"
      Secondary keywords: ${{ params.secondary_keywords }}
      Target word count: ${{ params.target_word_count }}
      Reading level: ${{ params.reading_level }}

      Optimization tasks:
      1. Craft an optimized title (include primary keyword, under 60 chars)
      2. Write a compelling meta description (under 160 chars)
      3. Restructure headings for keyword inclusion and hierarchy
      4. Naturally incorporate keywords (avoid stuffing)
      5. Add internal link suggestions [LINK: anchor text -> /suggested/path]
      6. Improve intro (hook readers in first 100 words)
      7. Add a clear CTA (call to action)
      8. Ensure content matches search intent

      Preserve the author's voice and factual accuracy.

      SEO analysis and original content: {{ input }}
    handoffs:
      # Fan-out: check readability AND technical SEO in parallel
      - to: "readability_checker, technical_checker"
        task: parallel_check
        condition: always

  # ── Stage 3a: Readability Check (parallel) ─────────────────────────────
  - id: readability_checker
    name: Readability Checker
    runtime: api
    model: claude-sonnet-4-20250514
    system_prompt: |
      Check the readability of the optimized blog post.
      Target level: ${{ params.reading_level }}.

      Evaluate:
      1. Flesch-Kincaid readability score
      2. Average sentence length (target: 15-20 words)
      3. Paragraph length (target: 2-4 sentences)
      4. Use of transition words
      5. Active vs. passive voice ratio
      6. Jargon level appropriateness for ${{ params.reading_level }} audience

      Provide specific line-level suggestions for improvement.

      Optimized content: {{ input }}
    handoffs:
      - to: keyword_checker
        task: collect_readability
        condition: always

  # ── Stage 3b: Technical SEO Check (parallel) ──────────────────────────
  - id: technical_checker
    name: Technical SEO Checker
    runtime: api
    model: claude-sonnet-4-20250514
    system_prompt: |
      Perform a technical SEO check on the optimized blog post.
      Primary keyword: "${{ params.target_keyword }}"

      Verify:
      1. Keyword in first 100 words
      2. Keyword in at least one H2
      3. Keyword density between 1-2%
      4. Secondary keyword coverage: ${{ params.secondary_keywords }}
      5. URL slug optimization
      6. Schema markup suggestions (Article, FAQ, HowTo)
      7. Image alt text includes keyword variations
      8. Word count meets target: ${{ params.target_word_count }}

      Provide a technical SEO score (0-100).

      Optimized content: {{ input }}
    handoffs:
      - to: keyword_checker
        task: collect_technical
        condition: always

  # ── Stage 4: Final Keyword Verification ────────────────────────────────
  # LLM gate checks overall SEO score. Below threshold -> back to rewriter.
  - id: keyword_checker
    name: SEO Score Gate
    runtime: api
    model: claude-sonnet-4-20250514
    system_prompt: |
      Compile the readability and technical SEO results into a final SEO score.

      Scoring weights:
      - Keyword optimization: 30%
      - Content quality: 25%
      - Readability: 20%
      - Technical SEO: 15%
      - User experience signals: 10%

      Target score: ${{ params.target_seo_score }}/100
      Primary keyword: "${{ params.target_keyword }}"

      Provide:
      1. Final SEO score (0-100)
      2. Score breakdown by category
      3. Remaining improvement opportunities
      4. Competitive positioning estimate

      Combined check results: {{ input }}
    gate:
      type: llm
      prompt: "Is the final SEO score at or above ${{ params.target_seo_score }}? Reject if below target or if there are critical SEO issues remaining."
    handoffs:
      # Score meets target -> publish
      - to: publisher
        task: publish
        condition: on_approve
      # Score below target -> reverse feedback loop to rewriter
      - to: rewriter
        task: further_optimize
        condition: on_reject
        payload: "{{ output }}\n\nSEO_FEEDBACK: {{ reject_reason }}\nPlease further optimize to meet the target score of ${{ params.target_seo_score }}."

  # ── Stage 5: Publish ───────────────────────────────────────────────────
  # Prepares the final output with all SEO metadata.
  - id: publisher
    name: Blog Publisher
    runtime: api
    model: claude-sonnet-4-20250514
    mcp:
      - server: filesystem
    system_prompt: |
      Prepare the final blog post for publication.

      Create the complete output:
      1. Optimized blog post (full markdown)
      2. Meta title and description
      3. URL slug
      4. Tags and categories
      5. Schema markup (JSON-LD)
      6. Social media preview (Open Graph tags)
      7. Suggested internal links
      8. Publication checklist

      Publish-ready content: {{ input }}
