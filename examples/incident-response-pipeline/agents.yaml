# =============================================================================
# Incident Response Pipeline
# =============================================================================
# Flow: detect -> assess (auto routing by severity) -> fix -> verify -> postmortem
#
# Differentiators used:
#   - Agent-decided routing (condition: auto + HANDOFF: agent_id)
#   - approve/reject gate (LLM on fix verification)
#   - Reverse feedback loop (verify fails -> back to fix)
#   - Declarative MCP server connections (github, filesystem)
#   - File-based context.md accumulation
#   - ${{ params.X }} parameterization
#
# Usage:
#   aqm run --input "API latency spike: p99 jumped from 200ms to 5s"
# =============================================================================

apiVersion: aqm/v0.1

params:
  service_name: "api-gateway"
  environment: "production"
  on_call_team: "platform-eng"
  runbook_path: "/docs/runbooks"
  notification_channel: "#incidents"

agents:
  # ── Stage 1: Detection & Triage ────────────────────────────────────────
  # Parses the alert and gathers initial context.
  - id: detector
    name: Incident Detector
    runtime: text
    model: claude-sonnet-4-20250514
    mcp:
      - server: filesystem
    system_prompt: |
      You are an SRE incident responder for the ${{ params.service_name }} service
      in the ${{ params.environment }} environment.

      Analyze the incoming alert:
      1. Identify affected service(s) and scope
      2. Determine initial severity (SEV1 / SEV2 / SEV3 / SEV4)
      3. List potential root causes
      4. Check for related recent deployments or changes
      5. Reference relevant runbooks from ${{ params.runbook_path }}

      Alert: {{ input }}
    handoffs:
      - to: severity_router
        task: assess_severity
        condition: always

  # ── Stage 2: Severity Router ───────────────────────────────────────────
  # Auto-routes based on severity assessment. The agent decides the
  # target by emitting HANDOFF: <agent_id> in its output.
  - id: severity_router
    name: Severity Router
    runtime: text
    model: claude-sonnet-4-20250514
    system_prompt: |
      You are an incident severity assessor for ${{ params.service_name }}.

      Based on the incident details, route to the appropriate responder:
      - critical_fix: SEV1/SEV2 — customer-facing outage or data loss risk
      - standard_fix: SEV3/SEV4 — degraded performance or non-critical issue

      Consider:
      - Blast radius (number of affected users)
      - Data integrity risk
      - Revenue impact
      - Whether a rollback is possible

      IMPORTANT: Include exactly one line: HANDOFF: <agent_id>

      Incident analysis: {{ input }}
    handoffs:
      - to: severity_router
        task: route
        condition: auto

  # ── Stage 3a: Critical Fix ─────────────────────────────────────────────
  # For SEV1/SEV2 incidents — immediate mitigation actions.
  - id: critical_fix
    name: Critical Incident Responder
    runtime: claude_code
    mcp:
      - server: github
      - server: filesystem
    system_prompt: |
      CRITICAL INCIDENT — ${{ params.service_name }} (${{ params.environment }})
      On-call team: ${{ params.on_call_team }}

      Execute immediate mitigation:
      1. Identify the fastest path to restore service (rollback, feature flag, scale)
      2. Draft the rollback or hotfix
      3. Prepare communication for ${{ params.notification_channel }}
      4. Document all actions taken with timestamps

      Prioritize SPEED over perfection. Restore service first.

      Incident details: {{ input }}
    claude_code_flags:
      - "--allowedTools"
      - "Edit,Write,Bash,Read"
    handoffs:
      - to: verifier
        task: verify_fix
        condition: always

  # ── Stage 3b: Standard Fix ─────────────────────────────────────────────
  # For SEV3/SEV4 incidents — methodical debugging and fix.
  - id: standard_fix
    name: Standard Incident Responder
    runtime: claude_code
    mcp:
      - server: github
      - server: filesystem
    system_prompt: |
      Standard incident response for ${{ params.service_name }} (${{ params.environment }}).

      Methodically address the issue:
      1. Reproduce the problem
      2. Identify root cause
      3. Implement fix with tests
      4. Verify the fix locally
      5. Create a PR with clear description

      Incident details: {{ input }}
    claude_code_flags:
      - "--allowedTools"
      - "Edit,Write,Bash,Read"
    handoffs:
      - to: verifier
        task: verify_fix
        condition: always

  # ── Stage 4: Verify ────────────────────────────────────────────────────
  # LLM gate verifies the fix. Reject sends back for rework.
  - id: verifier
    name: Fix Verifier
    runtime: text
    model: claude-sonnet-4-20250514
    mcp:
      - server: filesystem
    system_prompt: |
      Verify the incident fix for ${{ params.service_name }}.

      Check:
      1. Does the fix address the root cause (not just symptoms)?
      2. Are there tests covering the failure scenario?
      3. Is the fix safe to deploy to ${{ params.environment }}?
      4. Are there any regression risks?
      5. Is rollback possible if the fix causes new issues?

      Fix details: {{ input }}
    gate:
      type: llm
      prompt: "Is this fix verified and safe to deploy to ${{ params.environment }}? Consider both effectiveness and risk."
    handoffs:
      # Approved -> write postmortem
      - to: postmortem
        task: write_postmortem
        condition: on_approve
      # Rejected -> reverse feedback loop to fix
      - to: standard_fix
        task: revise_fix
        condition: on_reject
        payload: "{{ output }}\n\nVERIFICATION_FAILED: {{ reject_reason }}\nPlease address the verification concerns."

  # ── Stage 5: Postmortem ────────────────────────────────────────────────
  # Generates a blameless postmortem from the accumulated context.md.
  - id: postmortem
    name: Postmortem Writer
    runtime: text
    model: claude-sonnet-4-20250514
    system_prompt: |
      Write a blameless postmortem for the ${{ params.service_name }} incident.

      Use the full context history to produce:
      1. Incident summary (what happened, when, impact)
      2. Timeline of events and actions taken
      3. Root cause analysis (5 Whys)
      4. What went well
      5. What could be improved
      6. Action items with owners and due dates

      Service: ${{ params.service_name }}
      Environment: ${{ params.environment }}
      Team: ${{ params.on_call_team }}

      Incident context: {{ input }}
